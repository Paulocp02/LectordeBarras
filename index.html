<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner Asistencia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --accent2: #005c41;
    --danger: #ff4466;
    --text: #e8e8f0;
    --muted: #555570;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky; top: 0; z-index: 10;
  }
  .logo {
    font-size: 1.1rem; font-weight: 800; letter-spacing: -0.03em;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(0.7); }
  }
  .badge {
    background: var(--accent2); color: var(--accent);
    font-family: 'Space Mono', monospace; font-size: 0.8rem;
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--accent);
  }

  .cam-wrap {
    position: relative; background: #000;
    display: flex; align-items: center; justify-content: center;
    min-height: 180px;
  }
  #video {
    width: 100%; display: block;
    max-height: 200px; object-fit: cover;
  }

  .scan-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .scan-frame { width: 220px; height: 90px; position: relative; }
  .scan-frame::before, .scan-frame::after,
  .scan-frame span::before, .scan-frame span::after {
    content: ''; position: absolute;
    width: 22px; height: 22px;
    border-color: var(--accent); border-style: solid;
  }
  .scan-frame::before  { top:0; left:0;   border-width: 2px 0 0 2px; }
  .scan-frame::after   { top:0; right:0;  border-width: 2px 2px 0 0; }
  .scan-frame span::before { bottom:0; left:0;  border-width: 0 0 2px 2px; }
  .scan-frame span::after  { bottom:0; right:0; border-width: 0 2px 2px 0; }
  .scan-line {
    position: absolute; left:4px; right:4px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent);
  }
  @keyframes scanline {
    0%   { top: 4px; opacity:1; }
    100% { top: calc(100% - 6px); opacity:0.2; }
  }

  .flash-overlay {
    position: absolute; inset: 0;
    background: var(--accent); opacity: 0; pointer-events: none;
    transition: opacity 0.05s;
  }
  .flash-overlay.active { opacity: 0.4; }

  #placeholder {
    background: #111; width: 100%; min-height: 180px;
    display: flex; align-items: center; justify-content: center;
  }
  .start-btn {
    background: transparent; border: none; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    padding: 20px;
  }
  .start-icon {
    width: 68px; height: 68px; border-radius: 50%;
    background: var(--accent); color: #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    box-shadow: 0 0 30px #00e5a060;
  }
  .start-text { color: var(--muted); font-size: 0.85rem; }

  .error-box {
    background: #ff446618; border: 1px solid var(--danger);
    border-radius: 8px; padding: 14px 16px; margin: 12px 16px;
    font-size: 0.82rem; color: #ff8899; line-height: 1.6;
    display: none;
  }

  .status-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex; align-items: center; gap: 10px; min-height: 42px;
  }
  .status-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); white-space: nowrap; }
  .status-id {
    font-family: 'Space Mono', monospace; font-size: 0.95rem;
    color: var(--accent); font-weight: 700; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dup-tag {
    font-size: 0.6rem; background: #ff446622; color: var(--danger);
    border: 1px solid var(--danger); padding: 2px 6px;
    border-radius: 4px; font-family: 'Space Mono', monospace;
  }

  /* Session info bar */
  .session-bar {
    padding: 6px 20px;
    display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid var(--border);
    background: #0d0d14;
  }
  .session-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .session-info {
    font-size: 0.65rem; color: var(--muted);
    font-family: 'Space Mono', monospace; flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .session-info span { color: var(--accent); }

  .options-bar {
    padding: 7px 20px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .opt-label { font-size: 0.72rem; color: var(--muted); flex: 1; }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-slider {
    position: absolute; inset: 0;
    background: var(--border); border-radius: 20px; cursor: pointer; transition: background 0.2s;
  }
  .toggle-slider::after {
    content: ''; position: absolute;
    width: 14px; height: 14px; background: var(--muted);
    border-radius: 50%; top: 3px; left: 3px; transition: all 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--accent2); }
  .toggle input:checked + .toggle-slider::after { transform: translateX(16px); background: var(--accent); }

  .controls { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .btn {
    flex: 1; padding: 12px 8px; border: none; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    min-width: 0;
  }
  .btn-copy { background: var(--accent); color: #000; box-shadow: 0 4px 20px #00e5a040; }
  .btn-copy:active { transform: scale(0.97); }
  .btn-copy.ok { background: #fff; }
  .btn-csv {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent2);
    flex: 1;
  }
  .btn-csv:active { background: var(--accent2); }
  .btn-csv.ok { background: var(--accent2); }
  .btn-clear { background: transparent; color: var(--danger); border: 1px solid #ff446644; flex: 0 0 auto; padding: 12px 16px; }
  .btn-clear:active { background: #ff446611; }

  .list-header {
    padding: 8px 20px 6px; display: flex;
    align-items: center; justify-content: space-between;
  }
  .list-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .list-hint { font-size: 0.6rem; color: var(--muted); font-family: 'Space Mono', monospace; }

  #id-list {
    flex: 1; overflow-y: auto;
    padding: 0 16px 80px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .id-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    background: var(--surface); border-radius: 6px;
    border: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }
  .id-item.fresh { border-color: var(--accent); background: #00e5a010; }
  @keyframes slideIn {
    from { opacity:0; transform: translateX(-8px); }
    to   { opacity:1; transform: translateX(0); }
  }
  .item-num { font-size: 0.65rem; color: var(--muted); font-family: 'Space Mono', monospace; min-width: 18px; text-align: right; }
  .item-id  { font-family: 'Space Mono', monospace; font-size: 0.9rem; flex: 1; }
  .item-time { font-size: 0.6rem; color: var(--muted); font-family: 'Space Mono', monospace; white-space: nowrap; }
  .item-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 4px; }
  .item-del:active { color: var(--danger); }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-msg  { font-size: 0.85rem; line-height: 1.6; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: #000;
    padding: 10px 24px; border-radius: 24px;
    font-weight: 700; font-size: 0.9rem;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100; white-space: nowrap;
    box-shadow: 0 8px 30px #00e5a060;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>Asistencia</div>
  <div class="badge" id="badge">0 IDs</div>
</header>

<div class="cam-wrap" id="cam-wrap">
  <div id="placeholder">
    <button class="start-btn" id="start-btn" onclick="startCamera()">
      <div class="start-icon">📷</div>
      <span class="start-text">Toca para activar la cámara</span>
    </button>
  </div>
  <video id="video" playsinline autoplay muted style="display:none"></video>
  <div class="scan-overlay" id="overlay" style="display:none">
    <div class="scan-frame"><span></span><div class="scan-line"></div></div>
  </div>
  <div class="flash-overlay" id="flash"></div>
</div>

<div class="error-box" id="err-box"></div>

<div class="status-bar">
  <span class="status-label">Último</span>
  <span class="status-id" id="last-id">—</span>
  <span class="dup-tag" id="dup-tag" style="display:none">DUPLICADO</span>
</div>

<div class="session-bar">
  <div class="session-dot"></div>
  <span class="session-info" id="session-info">Sesión: <span id="session-name">—</span></span>
</div>

<div class="options-bar">
  <span class="opt-label">Ignorar duplicados automáticamente</span>
  <label class="toggle">
    <input type="checkbox" id="no-dups" checked>
    <span class="toggle-slider"></span>
  </label>
</div>

<div class="controls">
  <button class="btn btn-copy" id="copy-btn" onclick="copyAll()">📋 Copiar</button>
  <button class="btn btn-csv"  id="csv-btn"  onclick="downloadCSV()">⬇ CSV</button>
  <button class="btn btn-clear" onclick="clearAll()">🗑</button>
</div>

<div class="list-header">
  <span class="list-title">IDs escaneados</span>
  <span class="list-hint">uno por línea al pegar</span>
</div>
<div id="id-list">
  <div class="empty">
    <div class="empty-icon">↑</div>
    <div class="empty-msg">Activá la cámara y acercá<br>el carnet para escanear</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Storage key & session ───────────────────────────────────────────────────
const STORAGE_KEY = 'asistencia_ids';

// Each entry: { id, timestamp }
let entries = [];
let lastCode = null;
let lastCodeTime = 0;
let detector = null;
let rafId = null;

// Session name = date + time at page load
const sessionName = (() => {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
})();

// ─── Persistence ─────────────────────────────────────────────────────────────
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Support old format (plain string array) and new format (objects)
      entries = parsed.map(e => typeof e === 'string' ? { id: e, timestamp: '' } : e);
    }
  } catch (_) { entries = []; }
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch (_) {}
}

// ─── UI helpers ──────────────────────────────────────────────────────────────
function showErr(msg) {
  const b = document.getElementById('err-box');
  b.style.display = 'block';
  b.innerHTML = msg;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function doFlash() {
  const f = document.getElementById('flash');
  f.classList.add('active');
  setTimeout(() => f.classList.remove('active'), 120);
}

// ─── Camera ───────────────────────────────────────────────────────────────────
async function startCamera() {
  document.getElementById('start-btn').style.display = 'none';

  if (!('BarcodeDetector' in window)) {
    showErr(`
      <strong>⚠️ Tu navegador no soporta el escáner nativo.</strong><br><br>
      Solución: Abrí este archivo con <strong>Google Chrome en Android</strong> (v83 o superior).<br>
      En iPhone: Safari iOS 17+ o Chrome iOS también funcionan.<br><br>
      Si ya usás Chrome y no funciona, probá habilitar:<br>
      <code>chrome://flags → #enable-experimental-web-platform-features</code>
    `);
    document.getElementById('start-btn').style.display = 'flex';
    return;
  }

  try {
    const supported = await BarcodeDetector.getSupportedFormats();
    detector = new BarcodeDetector({ formats: supported });
  } catch(e) {
    showErr('Error al crear detector: ' + e.message);
    document.getElementById('start-btn').style.display = 'flex';
    return;
  }

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
  } catch(e) {
    let msg = '❌ No se pudo acceder a la cámara.<br>';
    if (e.name === 'NotAllowedError')       msg += 'Permiso denegado. Ve a ajustes del navegador y permite el acceso a la cámara.';
    else if (e.name === 'NotFoundError')    msg += 'No se encontró ninguna cámara.';
    else if (e.name === 'NotReadableError') msg += 'La cámara está siendo usada por otra aplicación.';
    else msg += e.message;
    showErr(msg);
    document.getElementById('start-btn').style.display = 'flex';
    return;
  }

  const video = document.getElementById('video');
  video.srcObject = stream;
  document.getElementById('placeholder').style.display = 'none';
  video.style.display = 'block';
  document.getElementById('overlay').style.display = 'flex';

  video.addEventListener('loadedmetadata', () => {
    video.play().then(() => tick()).catch(e => showErr('Error al reproducir video: ' + e.message));
  });
}

async function tick() {
  const video = document.getElementById('video');
  if (!video || video.readyState < 2) { rafId = requestAnimationFrame(tick); return; }
  try {
    const results = await detector.detect(video);
    if (results.length > 0) {
      const code = results[0].rawValue;
      const now = Date.now();
      if (code !== lastCode || now - lastCodeTime > 1500) {
        lastCode = code;
        lastCodeTime = now;
        onScanned(code);
      }
    }
  } catch (_) {}
  rafId = requestAnimationFrame(tick);
}

// ─── Scan handler ─────────────────────────────────────────────────────────────
function onScanned(id) {
  const noDups = document.getElementById('no-dups').checked;
  const isDup  = entries.some(e => e.id === id);

  doFlash();
  if (navigator.vibrate) navigator.vibrate(isDup ? [30,30,30] : 60);

  document.getElementById('last-id').textContent = id;
  const dupTag = document.getElementById('dup-tag');

  if (isDup && noDups) {
    dupTag.style.display = 'inline';
    setTimeout(() => dupTag.style.display = 'none', 1500);
    return;
  }
  dupTag.style.display = 'none';

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const timestamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  entries.unshift({ id, timestamp });
  saveToStorage();
  renderList(id);
  updateBadge();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderList(freshId) {
  const list = document.getElementById('id-list');
  if (entries.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">↑</div><div class="empty-msg">Activá la cámara y acercá<br>el carnet para escanear</div></div>`;
    return;
  }
  list.innerHTML = entries.map((entry, i) => `
    <div class="id-item ${entry.id === freshId && i === 0 ? 'fresh' : ''}">
      <span class="item-num">${entries.length - i}</span>
      <span class="item-id">${entry.id}</span>
      ${entry.timestamp ? `<span class="item-time">${entry.timestamp.split(' ')[1]}</span>` : ''}
      <button class="item-del" onclick="removeId(${i})">✕</button>
    </div>
  `).join('');
}

function updateBadge() {
  const n = entries.length;
  document.getElementById('badge').textContent = `${n} ID${n !== 1 ? 's' : ''}`;
}

function updateSessionBar() {
  document.getElementById('session-name').textContent = sessionName;
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function removeId(i) {
  entries.splice(i, 1);
  saveToStorage();
  renderList();
  updateBadge();
}

async function copyAll() {
  if (!entries.length) { showToast('⚠️ No hay IDs todavía'); return; }
  const text = [...entries].reverse().map(e => e.id).join('\n');
  try {
    await navigator.clipboard.writeText(text);
  } catch(e) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  const btn = document.getElementById('copy-btn');
  btn.classList.add('ok'); btn.textContent = '✅ ¡Copiado!';
  setTimeout(() => { btn.classList.remove('ok'); btn.innerHTML = '📋 Copiar'; }, 2000);
  showToast(`✅ ${entries.length} IDs copiados`);
}

function downloadCSV() {
  if (!entries.length) { showToast('⚠️ No hay IDs todavía'); return; }

  // Build CSV: header + rows in chronological order
  const rows = [['#', 'ID', 'Fecha', 'Hora']];
  [...entries].reverse().forEach((e, i) => {
    const [fecha, hora] = e.timestamp ? e.timestamp.split(' ') : ['', ''];
    rows.push([i + 1, e.id, fecha, hora]);
  });

  const csv = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\r\n');

  // File name includes session timestamp
  const safeName = sessionName.replace(/[: ]/g, '-');
  const filename = `asistencia_${safeName}.csv`;

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }); // BOM for Excel
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  const btn = document.getElementById('csv-btn');
  btn.classList.add('ok'); btn.textContent = '✅ Descargado';
  setTimeout(() => { btn.classList.remove('ok'); btn.innerHTML = '⬇ CSV'; }, 2500);
  showToast(`⬇ ${filename}`);
}

function clearAll() {
  if (!entries.length) return;
  if (!confirm(`¿Borrar los ${entries.length} IDs escaneados? También se borrará la memoria guardada.`)) return;
  entries = [];
  lastCode = null;
  saveToStorage();
  renderList(); updateBadge();
  document.getElementById('last-id').textContent = '—';
  showToast('🗑 Lista limpiada');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadFromStorage();
updateSessionBar();
renderList();
updateBadge();

if (entries.length > 0) {
  showToast(`💾 ${entries.length} IDs cargados de memoria`);
}
</script>
</body>
</html>
