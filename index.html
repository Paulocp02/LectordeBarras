<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Auto Asistencia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }

    input {
      font-size: 22px;
      padding: 10px;
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    table {
      margin-top: 20px;
      border-collapse: collapse;
      width: 100%;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
    }

    th {
      background: #333;
      color: white;
    }

    #video {
      width: 100%;
      max-width: 400px;
      display: none;
      margin-top: 10px;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
      color: green;
    }
  </style>
</head>

<body>

<h2>📋 Sistema de Auto Asistencia</h2>

<input id="scanner" placeholder="Escanea tu carnet..." autofocus>

<br>

<button onclick="activarCamara()">📷 Escanear con cámara</button>
<button onclick="descargarCSV()">⬇ Descargar CSV</button>

<div id="status"></div>

<!-- FIX 1: agregado playsinline y muted -->
<video id="video" autoplay playsinline muted></video>

<table>
  <thead>
    <tr>
      <th>Código</th>
      <th>Fecha</th>
      <th>Hora</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<script>
let asistencias = [];
let detector = null;
let stream = null;

// FIX 2: variables para el debounce
let ultimoCodigo = null;
let ultimoTiempo = 0;

// ===============================
// REGISTRO PRINCIPAL
// ===============================
function registrarAsistencia(codigo) {
  if (!codigo) return;

  const ahora = new Date();

  const registro = {
    codigo: codigo.trim(),
    fecha: ahora.toISOString().split("T")[0],
    hora: ahora.toLocaleTimeString()
  };

  asistencias.push(registro);
  agregarTabla(registro);

  mostrarStatus("✔ Asistencia registrada: " + codigo.trim());

  document.getElementById("scanner").value = "";
}

// ===============================
// TABLA
// ===============================
function agregarTabla(r) {
  const fila = document.createElement("tr");

  fila.innerHTML = `
    <td>${r.codigo}</td>
    <td>${r.fecha}</td>
    <td>${r.hora}</td>
  `;

  document.getElementById("tabla").appendChild(fila);
}

// ===============================
// INPUT (PISTOLA USB)
// ===============================
const input = document.getElementById("scanner");

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    registrarAsistencia(input.value);
  }
});

setInterval(() => input.focus(), 1000);

// ===============================
// CAMARA
// ===============================
async function activarCamara() {
  if (!("BarcodeDetector" in window)) {
    alert("Tu navegador no soporta escaneo por cámara.\nUsá Google Chrome en Android (v83+).");
    return;
  }

  try {
    const formatosSoportados = await BarcodeDetector.getSupportedFormats();
    detector = new BarcodeDetector({ formats: formatosSoportados });
  } catch (err) {
    alert("Error al crear el detector: " + err.message);
    return;
  }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    video.style.display = "block";

    // FIX 2: esperar a que el video esté listo antes de escanear
    video.onloadedmetadata = () => {
      video.play().then(() => scanLoop(video));
    };

  } catch (err) {
    alert("Error al abrir cámara: " + err.message);
  }
}

// FIX 2: verificar readyState y aplicar debounce
async function scanLoop(video) {
  if (video.readyState < 2) {
    requestAnimationFrame(() => scanLoop(video));
    return;
  }

  try {
    const codes = await detector.detect(video);

    if (codes.length > 0) {
      const codigo = codes[0].rawValue;
      const ahora = Date.now();

      if (codigo !== ultimoCodigo || ahora - ultimoTiempo > 1500) {
        ultimoCodigo = codigo;
        ultimoTiempo = ahora;
        registrarAsistencia(codigo);
        detenerCamara();
        return;
      }
    }
  } catch (e) {
    // frame no disponible aún, continuar
  }

  requestAnimationFrame(() => scanLoop(video));
}

function detenerCamara() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
  document.getElementById("video").style.display = "none";
}

// ===============================
// CSV
// ===============================
function descargarCSV() {
  let csv = "Codigo,Fecha,Hora\n";

  asistencias.forEach(r => {
    csv += `${r.codigo},${r.fecha},${r.hora}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "asistencia.csv";
  a.click();
}

// ===============================
// STATUS
// ===============================
function mostrarStatus(msg) {
  const status = document.getElementById("status");
  status.innerText = msg;

  setTimeout(() => {
    status.innerText = "";
  }, 2000);
}
</script>

</body>
</html>
